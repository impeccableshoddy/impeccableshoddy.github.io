{% extends "base.html" %}

{% block content %}
<div class="prose">
  <p class="section-label">The Dossier</p>
  <h1 class="section-title">Credentials, such as they are</h1>
  <hr class="divider">
  <p style="font-style: italic; color: #888;">A fragile attempt at professional visibility.</p>
  <div style="margin-top: var(--space-m);">
    <iframe src="{{ get_url(path='files/resume.pdf') }}" width="100%" height="850px" style="border: 1px solid var(--faint);"></iframe>
  </div>
  <p style="margin-top: var(--space-s); font-family: var(--font-display); font-size: 0.95rem;">
    <a href="{{ get_url(path='files/resume.pdf') }}" download>Download PDF</a>
  </p>
</div>
{% endblock %}
