<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {% if page.title %}{{ page.title }} — The Red Orchard{% else %}The Red Orchard{% endif %}
  </title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}The Red Orchard — a living space for work, thought, and making.{% endif %}" />
  
  <link rel="stylesheet" href="{{ get_url(path='css/main.css', cachebust=true) }}" />
  <link rel="icon" type="image/svg+xml" href="{{ get_url(path='images/favicon.svg') }}">
  <link rel="stylesheet" href="{{ get_url(path='/giallo.css') }}">
</head>
<body>

  <nav class="site-nav">
  <a class="nav-logo" href="{{ get_url(path='/') }}">The <span>Red</span> Orchard</a>
  <button class="nav-toggle" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links">
    <li><a href="{{ get_url(path='/') }}">The Orchard</a></li>
    <li><a href="{{ get_url(path='/shack/') }}">The Shack</a></li>
    <li><a href="{{ get_url(path='/redberries/') }}">Redberries</a></li>
    <li><a href="{{ get_url(path='/dossier/') }}">The Dossier</a></li>
    <li>
      <a href="https://github.com/impeccableshoddy" aria-label="GitHub" style="border:none;">
        <img src="{{ get_url(path='images/github.svg') }}" alt="GitHub" style="width:1.2rem;height:1.2rem;vertical-align:middle;opacity:0.7;transition:opacity 0.2s;">
      </a>
    </li>
  </ul>
</nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Words can be misleading. No one knows better. But trust me.</p>
  </footer>
  <script>
      const toggle = document.querySelector(".nav-toggle");
  const links = document.querySelector(".nav-links");

  toggle.addEventListener("click", function() {
    toggle.classList.toggle("open");
    links.classList.toggle("open");
  });

  document.querySelectorAll(".nav-links a").forEach(function(link) {
    link.addEventListener("click", function() {
      toggle.classList.remove("open");
      links.classList.remove("open");
    });
  });

  document.addEventListener("click", function(e) {
    if (!e.target.closest("nav")) {
      toggle.classList.remove("open");
      links.classList.remove("open");
    }
  });

const secretKey = document.getElementById("secretKey");
if (secretKey) {
  const bloom = document.createElement("div");
  bloom.className = "key-bloom";
  bloom.innerHTML = `<p>
    You found something.<br>
    <span>j / k</span>  to scroll.<br>
    <span>gg</span>  to surface.<br>
    <span>G</span>  to sink.<br>
    <span>h / l</span>  to wander.
  </p>`;
  secretKey.appendChild(bloom);

  secretKey.addEventListener("click", function(e) {
    e.stopPropagation();
    secretKey.classList.toggle("open");
    bloom.classList.toggle("open");
  });

  document.addEventListener("click", function(e) {
    if (!secretKey.contains(e.target)) {
      secretKey.classList.remove("open");
      bloom.classList.remove("open");
    }
  });
}

  let lastKey = "";
  let lastKeyTime = 0;

  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    const k = e.key;
    const now = Date.now();
    const amount = window.innerHeight * 0.3;

    if (k === "j") window.scrollBy(0, amount);
    if (k === "k") window.scrollBy(0, -amount);
    if (k === "h") history.back();
    if (k === "l") history.forward();
    if (k === "G") window.scrollTo(0, document.body.scrollHeight);
    if (k === "g" && lastKey === "g" && (now - lastKeyTime) < 500) window.scrollTo(0, 0);

    lastKey = k;
    lastKeyTime = now;
  });

</script>
</body>
</html>
