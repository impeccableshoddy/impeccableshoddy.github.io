{% extends "base.html" %}

{% block content %}
<article class="prose">
  <h1>{{ page.title }}</h1>
  <p class="meta">
    {% if page.date %}{{ page.date | date(format="%B %d, %Y") }}{% endif %}
    {% if page.extra.type %} · {{ page.extra.type }}{% endif %}
  </p>
  <hr class="divider">
  <div class="drop-cap">
    {{ page.content | safe }}
  </div>
</article>
{% endblock %}
